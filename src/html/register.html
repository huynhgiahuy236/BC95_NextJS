<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký — BC95 Hotel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-50 px-4">

    <!--
    TRANG ĐĂNG KÝ
    Dùng react-hook-form + zod giống Login, nhưng schema có thêm:
    - field "name": min 2 ký tự
    - field "confirmPassword": dùng z.refine() để so sánh với "password"
    z.refine() validate liên quan giữa nhiều field → không thể dùng z.string() đơn giản.
  -->
    <div class="w-full max-w-md bg-white rounded-2xl shadow-md p-8">

        <h1 class="text-2xl font-bold text-gray-900 mb-1">Tạo tài khoản</h1>

        <!-- Next.js <Link>: client-side navigation, không reload trang -->
        <p class="text-sm text-gray-500 mb-6">
            Đã có tài khoản?
            <a href="login.html" class="text-blue-600 hover:underline font-medium">Đăng nhập</a>
        </p>

        <form id="registerForm" class="space-y-4" novalidate>

            <!-- Field Họ tên — z.string().min(2) -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Họ và tên</label>
                <input id="name" type="text" placeholder="Nguyễn Văn A"
                    class="w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition" />
                <p id="nameError" class="mt-1 text-xs text-red-500 hidden"></p>
            </div>

            <!-- Field Email — z.string().email() -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input id="email" type="email" placeholder="you@example.com"
                    class="w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition" />
                <p id="emailError" class="mt-1 text-xs text-red-500 hidden"></p>
            </div>

            <!-- Field Mật khẩu — z.string().min(6) -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu</label>
                <input id="password" type="password" placeholder="••••••••"
                    class="w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition" />
                <p id="passwordError" class="mt-1 text-xs text-red-500 hidden"></p>
            </div>

            <!--
        Field Xác nhận mật khẩu — lỗi đến từ z.refine() ở schema:
        .refine(d => d.password === d.confirmPassword, { path: ["confirmPassword"] })
      -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Xác nhận mật khẩu</label>
                <input id="confirmPassword" type="password" placeholder="••••••••"
                    class="w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition" />
                <p id="confirmError" class="mt-1 text-xs text-red-500 hidden"></p>
            </div>

            <!-- isSubmitting: disabled + text thay đổi khi đang chờ API -->
            <button type="submit" id="submitBtn"
                class="w-full rounded-lg bg-blue-600 py-2.5 text-sm font-semibold text-white hover:bg-blue-700 active:scale-[.98] transition">
                Đăng ký
            </button>
        </form>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const fields = {
            name: document.getElementById('name'),
            email: document.getElementById('email'),
            password: document.getElementById('password'),
            confirmPassword: document.getElementById('confirmPassword'),
        };
        const errors = {
            name: document.getElementById('nameError'),
            email: document.getElementById('emailError'),
            password: document.getElementById('passwordError'),
            confirm: document.getElementById('confirmError'),
        };
        const submitBtn = document.getElementById('submitBtn');

        function showError(el, msg) {
            el.textContent = msg || '';
            el.classList.toggle('hidden', !msg);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = fields.name.value.trim();
            const email = fields.email.value.trim();
            const pass = fields.password.value;
            const confirm = fields.confirmPassword.value;

            // Validate từng field theo schema Zod
            let hasError = false;
            if (name.length < 2) { showError(errors.name, 'Tên tối thiểu 2 ký tự'); hasError = true; }
            else showError(errors.name, null);

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError(errors.email, 'Email không hợp lệ'); hasError = true; }
            else showError(errors.email, null);

            if (pass.length < 6) { showError(errors.password, 'Mật khẩu tối thiểu 6 ký tự'); hasError = true; }
            else showError(errors.password, null);

            // z.refine(): validate liên field password === confirmPassword
            if (pass !== confirm) { showError(errors.confirm, 'Mật khẩu xác nhận không khớp'); hasError = true; }
            else showError(errors.confirm, null);

            if (hasError) return;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Đang tạo tài khoản...';
            await new Promise(r => setTimeout(r, 800));
            submitBtn.disabled = false;
            submitBtn.textContent = 'Đăng ký';
            alert('Đăng ký thành công (demo)!');
        });
    </script>
</body>

</html>
